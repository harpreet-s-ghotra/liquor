name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test-windows.yml
    permissions:
      contents: read

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Publish to public releases repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo harpreet-s-ghotra/checkoutmain-releases \
            --title "High Spirits POS ${{ github.ref_name }}" \
            --notes "High Spirits POS ${{ github.ref_name }}" \
            dist/*.exe dist/latest.yml
